name: Publish to npm

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm
        permissions:
            contents: read
            id-token: write # Mandatory for Trusted Publishing & Provenance
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  registry-url: 'https://registry.npmjs.org'

            - run: npm ci
            - run: npm test
            - run: npm run build

            - name: Publish to npm
              run: npm publish --provenance --access public
              env:
                  # This maps your Granular Token to the CLI's auth requirement
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
