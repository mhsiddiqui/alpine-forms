<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
          integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
</head>
<body>
<div x-data="basicForm()">
    <form class="pure-form" @submit.prevent="form.submit((data) => submitHandler(data))">
        <fieldset>
            <div class="pure-u-1 pure-u-md-1-3 mt-1">
                <label for="multi-first-name">Email</label>
                <br/>
                <input x-register:form="form.field('email')" class="pure-u-23-24" type="email"/>
                <span x-show="!form.getFieldState('email').isValid" class="text-red"
                      x-text="form.getFieldState('email').error"></span>
            </div>
            <p x-text="form.getFieldState('email').isValid"></p>
            <p x-text="form.getFieldState('email').isDirty"></p>
            <p x-text="form.getFieldState('email').isTouched"></p>
        </fieldset>
        <fieldset>
            <div class="pure-u-1 pure-u-md-1-3 mt-1">
                <label for="multi-first-name">Password</label>
                <input x-register:form="form.field('password')" class="pure-u-23-24" type="password"/>
                <span x-show="!form.getFieldState('password').isValid" class="text-red"
                      x-text="form.getFieldState('password').error"></span>
            </div>
            <p x-text="form.getFieldState('password').isValid"></p>
            <p x-text="form.getFieldState('password').isDirty"></p>
            <p x-text="form.getFieldState('password').isTouched"></p>
        </fieldset>
        <div class="field is-grouped mt-1">
            <button class="pure-button">Save</button>
            <button class="pure-button">Cancel</button>
        </div>
    </form>
    <pre x-show="showResult" class="mt-1 p-1 border" x-text="result">
    </pre>
    <p x-text="form.getFormState().isValid"></p>
    <p x-text="form.getFormState().isSubmitting"></p>
    <p x-text="form.getFormState().isSubmitted"></p>
    <p x-text="form.getFormState().submitAttempts"></p>
</div>
<script src=" https://cdn.jsdelivr.net/npm/joi@17.13.3/dist/joi-browser.min.js" defer></script>
<script defer src="form.js"></script>
<script defer src="test.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
